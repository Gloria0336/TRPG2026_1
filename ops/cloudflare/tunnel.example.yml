# Copy this file to a private path before use, for example:
#   .cloudflare/trpg2026-tunnel.yml
#
# Do not commit the real credentials JSON generated by `cloudflared tunnel create`.

tunnel: YOUR_TUNNEL_UUID_OR_NAME
credentials-file: C:\Users\YOUR_USER\.cloudflared\YOUR_TUNNEL_UUID.json

ingress:
  - hostname: play.example.com
    service: http://127.0.0.1:8001
  - service: http_status:404
