<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Living World — Dashboard</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header>
    <h1>🎲 AI Living World <span class="sub">— GM Dashboard</span></h1>
    <span id="status" class="status offline">connecting…</span>
  </header>

  <main>
    <section id="scene" class="panel scene">
      <h2 id="scene-title">No active game</h2>
      <p id="scene-summary" class="muted">Start a session in Discord with <code>/start</code>.</p>
      <div id="scene-npcs" class="npcs"></div>
    </section>

    <section id="combat" class="panel combat hidden">
      <h2>⚔️ Combat <span id="combat-round" class="tag"></span></h2>
      <ol id="initiative" class="initiative"></ol>
    </section>

    <section class="panel">
      <h2>Party &amp; NPCs</h2>
      <div id="characters" class="cards"></div>
    </section>

    <section class="panel log">
      <h2>📜 Adventure Log</h2>
      <ul id="log" class="log-list"></ul>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
